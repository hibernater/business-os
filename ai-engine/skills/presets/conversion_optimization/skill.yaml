skill_id: conversion_optimization
skill_type: atomic
name: 转化率诊断优化
description: >
  从流量入口到成交的全链路转化分析，找出流失最严重的环节，
  给出针对性优化方案，让同样的流量带来更多订单。
version: 1

industry: ["家居收纳", "日用百货", "服装鞋帽", "3C数码", "通用"]
icon: "bar-chart"
usage_count: 1120

quick_setup:
  - question: "你觉得转化率哪个环节最有问题？"
    field: pain_point
    options: ["进店人多但不下单", "加购多但不付款", "整体转化低不知道为什么", "新品没转化"]
  - question: "你的店铺转化率大概多少？"
    field: current_rate
    options: ["1%以下", "1-3%", "3-5%", "5%以上", "不清楚"]

trigger_phrases:
  - 转化率分析
  - 转化率优化
  - 转化率太低
  - 为什么不下单
  - 流量浪费
  - 成交转化
  - 看看转化

twin_dimensions:
  - dimension: operation
    extract_keys: [overall_conversion, click_to_detail_rate, detail_to_cart_rate, cart_to_order_rate, bottleneck_stage, improvement_potential]

system_prompt: >
  你是一个电商转化率优化专家，擅长通过数据分析找出转化漏斗中的薄弱环节。
  分析要具体到每个环节的流失率，不要泛泛而谈。
  每条优化建议要附预期提升幅度和优先级。
  如果有企业资产数据，结合实际流量和转化数据分析。
  如果数据暂不可用，用合理模拟数据并标注【模拟数据】。

intake:
  - question_id: platform
    text: "主要分析哪个平台的转化率？"
    options: ["淘天", "拼多多", "抖音", "1688", "全部平台"]
    allow_free_input: true

  - question_id: product_scope
    text: "分析哪些商品？"
    options: ["全店铺", "爆款/主推款", "新品", "转化率最低的几款"]
    allow_free_input: true

  - question_id: traffic_source
    text: "你的流量主要来自哪些渠道？"
    options: ["自然搜索", "直通车/引力魔方", "直播", "短视频", "站外（小红书/微博）", "不太清楚"]
    allow_multiple: true

steps:
  - step_id: funnel_analysis
    name: 转化漏斗分析
    description: 拆解从曝光到成交的每个环节转化率
    checkpoint: true
    checkpoint_prompt: "漏斗分析好了。你看哪个环节流失最让你意外？有没有想深入分析的环节？"
    prompt_template: |
      用户的转化优化需求：
      {collected_info}

      企业已有数据：
      {enterprise_assets}

      请完成转化漏斗分析（如无真实数据用模拟数据标注）：
      1. 全链路漏斗（每个环节附转化率和行业均值对比）：
         曝光 → 点击 → 浏览详情 → 加购/收藏 → 下单 → 付款
      2. 各环节流失率和流失原因假设
      3. 瓶颈环节识别（哪个环节低于行业均值最多）
      4. 不同流量渠道的转化对比
    output_format: markdown

  - step_id: diagnosis
    name: 问题诊断
    description: 深入分析瓶颈环节的具体原因
    checkpoint: true
    checkpoint_prompt: "诊断结果出来了。有没有你已经尝试优化过但没效果的？告诉我可以排除这些方向。"
    prompt_template: |
      用户信息：{collected_info}
      漏斗分析：{previous_results}
      企业已有数据：{enterprise_assets}

      对瓶颈环节深入诊断：
      1. 详情页问题排查（首图吸引力、卖点表达、价格展示、信任背书）
      2. 价格因素分析（和竞品比贵了还是便宜了、优惠券设置）
      3. 评价影响分析（差评是否影响转化、评价数量是否不足）
      4. 流量质量评估（是不是来的人不精准）
      5. 每个问题附影响程度评估
    output_format: markdown

  - step_id: optimization_plan
    name: 优化方案
    description: 给出可落地的转化提升方案
    prompt_template: |
      用户信息：{collected_info}
      完整分析：{previous_results}
      企业已有数据：{enterprise_assets}

      请给出优化方案（按预期效果排序）：
      1. 快速见效（本周可做）
         - 具体动作 + 预期转化率提升
      2. 中期优化（1-2周）
         - 详情页调整、价格策略、评价优化
      3. 长期提升（持续迭代）
         - 流量结构优化、人群精准度提升
      4. A/B 测试建议（先测什么、怎么测）
    output_format: markdown

capture_prompt: >
  转化分析完成了。你的流量结构、关注环节和优化方向我都记住了。
  建议每周追踪一次关键转化指标，看优化效果。
