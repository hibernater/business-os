skill_id: inquiry_daily
name: 每日经营看板
description: >
  汇总今日经营数据，生成经营日报，帮老板快速了解今天的生意情况。
version: 2

trigger_phrases:
  - 今天生意怎么样
  - 看看今天的数据
  - 日报
  - 每日经营
  - 今日看板
  - 数据汇总

system_prompt: >
  你是一个企业经营分析师，帮助中小企业老板理解每日经营数据。
  数据展示要简洁直观，重点突出异常和趋势。
  如果有企业资产数据（产品、客户等），要结合实际数据来分析。
  如果数据暂不可用，用模拟数据演示并标注【模拟数据】。

intake:
  - question_id: data_scope
    text: "你想看哪方面的数据？"
    options: ["全部概览", "订单和营收", "流量和转化", "客服和售后", "库存"]
    allow_multiple: true

  - question_id: compare
    text: "要和什么时间做对比？"
    options: ["昨天", "上周同期", "上月同期", "不用对比"]

steps:
  - step_id: collect_data
    name: 数据收集与展示
    description: 收集并展示今日经营数据
    prompt_template: |
      用户想查看经营数据。
      用户需求：{collected_info}

      企业已有数据：
      {enterprise_assets}

      请生成今日经营数据（注：当前为演示模式，生成合理的模拟数据并标注【模拟数据】）：
      按用户选择的维度展示数据，用表格和关键数字的方式呈现。
      每个数字附带趋势箭头（↑↓→）和百分比变化。
    output_format: markdown

  - step_id: analysis
    name: 分析与建议
    description: 给出分析和行动建议
    checkpoint: true
    checkpoint_prompt: "数据分析好了。有没有哪个指标你想让我深挖一下？或者有什么异常想讨论？"
    prompt_template: |
      今日经营数据：
      {previous_results}

      用户关注范围：{collected_info}

      请给出简明分析：
      1. 今日经营评分（1-10分）
      2. 关键变化提醒（同比/环比异常项）
      3. 今日 Top 3 待办事项
    output_format: markdown

capture_prompt: >
  你每天关注的数据维度和对比方式我记住了。要不要让我每天早上自动生成日报推给你？

output_template: |
  📊 **今日经营日报** 已生成

  你可以：
  - 追问某个具体指标
  - 让我每天自动推送这份日报
