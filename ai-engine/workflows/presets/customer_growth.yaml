workflow_id: customer_growth
name: 客户增长分析
description: >
  分析客户分群数据，识别高价值客户，结合定价策略优化，
  形成完整的客户增长方案。
trigger_type: manual
cron_expr: null

nodes:
  - id: node_1
    type: skill
    label: 客户分群运营
    skill_id: customer_segmentation
    config: {}

  - id: node_2
    type: condition
    label: 是否有高价值客户
    skill_id: null
    config:
      expression: "VIP客户数 > 0"

  - id: node_3
    type: skill
    label: 智能定价策略
    skill_id: pricing_strategy
    config: {}

  - id: node_4
    type: skill
    label: 生成汇总报告
    skill_id: generate_summary
    config: {}

edges:
  - id: e1
    from: node_1
    to: node_2
    condition: null
  - id: e2
    from: node_2
    to: node_3
    condition: "有VIP客户时"
  - id: e3
    from: node_2
    to: node_4
    condition: "暂无VIP时"
  - id: e4
    from: node_3
    to: node_4
    condition: null
