workflow_id: competitive_monitor
name: 竞品监控与应对
description: >
  每周自动监控竞品动态，分析价格变动和选品机会，
  有重大变动时通知团队并等待人工确认后调整策略。
trigger_type: scheduled
cron_expr: "0 10 * * 1"

nodes:
  - id: node_1
    type: skill
    label: 竞品监控分析
    skill_id: competitor_monitor
    config: {}

  - id: node_2
    type: condition
    label: 竞品有重大变动
    skill_id: null
    config:
      expression: "竞品价格变动 > 10% 或有新品上架"

  - id: node_3
    type: notification
    label: 紧急通知运营
    skill_id: null
    config:
      channel: 企微
      message_template: "⚠️ 竞品重大变动预警：{prev_result}"
      recipients: ["运营组"]

  - id: node_4
    type: human_task
    label: 运营确认应对策略
    skill_id: null
    config:
      assignee: 运营负责人
      description: 请查看竞品变动分析，确认是否需要调整定价和选品策略

  - id: node_5
    type: skill
    label: 智能定价策略
    skill_id: pricing_strategy
    config: {}

  - id: node_6
    type: skill
    label: 爆款选品分析
    skill_id: product_selection
    config: {}

  - id: node_7
    type: skill
    label: 智能汇总报告
    skill_id: generate_summary
    config: {}

edges:
  - id: e1
    from: node_1
    to: node_2
    condition: null
  - id: e2
    from: node_2
    to: node_3
    condition: "有重大变动时"
  - id: e3
    from: node_2
    to: node_7
    condition: "无变动时"
  - id: e4
    from: node_3
    to: node_4
    condition: null
  - id: e5
    from: node_4
    to: node_5
    condition: null
  - id: e6
    from: node_5
    to: node_6
    condition: null
  - id: e7
    from: node_6
    to: node_7
    condition: null
